    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
        }

        header {
            background: #1a1a2e;
            border-bottom: 2px solid #e94560;
            padding: 16px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #e94560, #c23152);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .logo h1 { font-size: 1.4rem; }
        .logo h1 span { color: #e94560; }

        nav ul { display: flex; list-style: none; gap: 22px; }
        nav a { color: #aaa; font-size: 0.9rem; text-decoration: none; transition: color 0.3s; }
        nav a:hover { color: #e94560; }

        .page-wrapper {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* SIDEBAR */
        .sidebar {
            width: 170px;
            min-width: 170px;
            padding: 20px 8px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .ad-box {
            background: #141428;
            border: 1px dashed #2a2a3a;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            overflow: hidden;
        }

        .ad-box:hover { border-color: #e94560; }

        /* MAIN */
        .main { flex: 1; padding: 20px 15px; min-width: 0; }

        .section { margin-bottom: 25px; }

        .banner-card {
            background: #141428;
            border: 1px dashed #2a2a3a;
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            overflow: hidden;
        }
        .banner-card:hover { border-color: #e94560; }

        .video-card {
            background: #141428;
            border: 1px solid #222;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 6px 25px rgba(0,0,0,0.4);
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        .video-info { padding: 22px 25px; }
        .video-info h3 { font-size: 1.15rem; margin-bottom: 8px; }
        .video-info p { color: #777; font-size: 0.88rem; line-height: 1.6; margin-bottom: 20px; }

        .cta-box { display: flex; gap: 14px; flex-wrap: wrap; }

        .btn {
            padding: 13px 32px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
        }
        .btn-1 {
            background: linear-gradient(135deg, #e94560, #c23152);
            color: #fff;
            box-shadow: 0 4px 15px rgba(233,69,96,0.3);
        }
        .btn-1:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(233,69,96,0.5); }

        .btn-2 {
            background: transparent;
            color: #e94560;
            border: 2px solid #e94560;
        }
        .btn-2:hover { background: rgba(233,69,96,0.1); transform: translateY(-3px); }

        .separator {
            border: none;
            height: 1px;
            background: linear-gradient(to right, transparent, #222, transparent);
            margin: 5px 0 20px;
        }

        .heading {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .heading .bar { width: 4px; height: 24px; background: #e94560; border-radius: 2px; }
        .heading h2 { font-size: 1.2rem; }
        .heading h2 span { color: #e94560; }

        footer {
            background: #0a0a1a;
            border-top: 1px solid #1a1a2e;
            padding: 25px;
            text-align: center;
        }
        footer a { color: #555; font-size: 0.78rem; text-decoration: none; margin: 0 12px; }
        footer a:hover { color: #e94560; }
        footer p { color: #333; font-size: 0.72rem; margin-top: 12px; }
        footer p span { color: #e94560; }

        @media (max-width: 900px) {
            .sidebar { display: none; }
            header { flex-direction: column; gap: 10px; }
            .cta-box { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
