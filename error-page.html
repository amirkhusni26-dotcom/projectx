<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oops! Tautan Bermasalah</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #25D366; /* Hijau WhatsApp untuk tombol kembali */
            --primary-hover: #20ba5a;
            --error-color: #e74c3c; /* Merah untuk penanda error */
            --error-bg: rgba(231, 76, 60, 0.1);
            --dark-color: #111b21;
            --light-bg: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #3b4a54;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Utama */
        .error-container {
            background: var(--card-bg);
            max-width: 450px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            padding: 40px 24px;
        }

        /* Icon Area */
        .icon-box {
            width: 80px;
            height: 80px;
            background: var(--error-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .icon-box svg {
            width: 40px;
            height: 40px;
            stroke: var(--error-color);
        }

        h1 {
            font-size: 1.5rem;
            color: var(--dark-color);
            margin-bottom: 12px;
            font-weight: 700;
        }

        p.description {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #667781;
            margin-bottom: 32px;
            padding: 0 10px;
        }

        /* Tombol CTA Kembali */
        .btn-back {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 20px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            text-decoration: none;
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
            transition: all 0.3s ease;
            width: 100%;
            border: none;
            cursor: pointer;
        }

        .btn-back:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-back svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .support-link {
            display: inline-block;
            margin-top: 24px;
            font-size: 0.85rem;
            color: #8696a0;
            text-decoration: none;
        }

        .support-link:hover {
            color: var(--dark-color);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="icon-box">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        </div>

        <h1>Oops! Link Bermasalah</h1>
        <p class="description">Tautan yang Anda tuju mungkin sudah kedaluwarsa, ditarik, atau terjadi kesalahan pada server kami.</p>

        <a href="download.html" class="btn-back">
            <svg viewBox="0 0 24 24">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Kembali ke Beranda
        </a>

        <a href="download.html" class="support-link">Laporkan masalah ini ke Admin</a>
    </div>

</body>
</html>
