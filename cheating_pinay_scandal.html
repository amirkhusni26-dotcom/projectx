    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100svh;
            display: grid;
            place-items: center;
            background-color: #121212;
            padding: 16px;
        }

        .video-container {
            /* Ini yang membuat rasio tepat 9:16 */
            aspect-ratio: 9 / 16;
            width: 100%;
            max-width: 430px; /* Ukuran maksimal di desktop, sama seperti reels */
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            cursor: pointer;
            background-color: black;
        }

        video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Agar video tidak terdistorsi sama sekali */
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            display: grid;
            place-items: center;
            color: white;
            font-size: 32px;
            transition: opacity 150ms ease;
            pointer-events: none;
            padding-left: 4px;
        }

        /* Sembunyikan tombol ketika video sedang bermain */
        .video-container.playing .play-button {
            opacity: 0;
        }
		
		 /* Styling Utama Tombol Mengambang */
  .floating-download {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 9999;
    background: linear-gradient(135deg, #00b0ff, #0083ff);
    color: #ffffff;
    padding: 15px 25px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
    box-shadow: 0 8px 15px rgba(0, 131, 255, 0.4);
    display: flex;
    align-items: center;
    gap: 10px;
    
    /* Animasi Mengambang (Floating & Bouncing) */
    animation: float 2.5s ease-in-out infinite;
    transition: all 0.3s ease;
  }

  /* Efek Hover: Berhenti melayang dan membesar sedikit */
  .floating-download:hover {
    transform: translateY(-7px) scale(1.05);
    box-shadow: 0 12px 20px rgba(0, 131, 255, 0.6);
    background: linear-gradient(135deg, #00c6ff, #0072ff);
  }

  /* Efek Active: Saat tombol diklik */
  .floating-download:active {
    transform: translateY(-2px);
  }

  /* Kunci Animasi (Keyframes) */
  @keyframes float {
    0%, 100% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(-10px);
    }
  }
