            /* Durasi dipercepat agar pergerakan terasa lebih dinamis dan bertenaga */
            animation: ultraFloat 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            pointer-events: none;
            user-select: none;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        /* Animasi gerakan zig-zag melengkung ke atas dengan efek semburan */
        @keyframes ultraFloat {
            0% {
                transform: translateY(0) translateX(0) scale(0.3) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: translateY(-40px) translateX(var(--x-mid)) scale(1.4) rotate(var(--rot-mid));
            }
            50% {
                transform: translateY(-180px) translateX(var(--x-sideways)) scale(1.1) rotate(var(--rot-sideways));
            }
            100% {
                transform: translateY(-380px) translateX(var(--x-end)) scale(0.6) rotate(var(--rot-end));

            }
        }

    // Fungsi untuk memaksa video berputar secara aman
    function jalankanAutoplay() {
        video.play().catch(err => {

        });
    }

    // Jalankan langsung saat halaman dimuat
    document.addEventListener("DOMContentLoaded", () => {
        const isAgeVerified = localStorage.getItem('ageVerified');
        
        if (isAgeVerified === "true") {

            ageGate.classList.add('hidden');
            
            // Putar video dulu (muted), lalu coba un-mute setelah video berjalan
            jalankanAutoplay();

                    video.pause();
                    ageGate.classList.remove('hidden'); // Paksa muncul setelah 5 detik
                }
            }, 5000);
        }
    });

    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('floating-heart');
        
        const heartTypes = ['❤️', '💖', '💝', '💕', '💗', '🔥', '👑', '⭐', '🌈', '🔮'];
        heart.innerText = heartTypes[Math.floor(Math.random() * heartTypes.length)];
        
        const xMid = (Math.random() * 80 - 40) + 'px';       
        const xSideways = (Math.random() * 140 - 70) + 'px'; 
        const xEnd = (Math.random() * 180 - 90) + 'px';      
        
        const rotMid = (Math.random() * 60 - 30) + 'deg';
        const rotSideways = (Math.random() * 120 - 60) + 'deg';
        const rotEnd = (Math.random() * 180 - 90) + 'deg';
        
        heart.style.setProperty('--x-mid', xMid);
        heart.style.setProperty('--x-sideways', xSideways);
        heart.style.setProperty('--x-end', xEnd);
        heart.style.setProperty('--rot-mid', rotMid);
        heart.style.setProperty('--rot-sideways', rotSideways);
        heart.style.setProperty('--rot-end', rotEnd);
        
        heart.style.fontSize = (Math.random() * 14 + 20) + 'px';
        heartsContainer.appendChild(heart);

        setTimeout(() => { heart.remove(); }, 2000);
    }

    // AUTO STREAMING LIKE
