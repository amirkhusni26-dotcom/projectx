<!DOCTYPE html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player 9:16</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100svh;
            display: grid;
            place-items: center;
            background-color: #121212;
            padding: 16px;
        }

        .video-container {
            /* Ini yang membuat rasio tepat 9:16 */
            aspect-ratio: 9 / 16;
            width: 100%;
            max-width: 430px; /* Ukuran maksimal di desktop, sama seperti reels */
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            cursor: pointer;
            background-color: black;
        }

        video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Agar video tidak terdistorsi sama sekali */
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            display: grid;
            place-items: center;
            color: white;
            font-size: 32px;
            transition: opacity 150ms ease;
            pointer-events: none;
            padding-left: 4px;
        }

        /* Sembunyikan tombol ketika video sedang bermain */
        .video-container.playing .play-button {
            opacity: 0;
        }
    </style>
